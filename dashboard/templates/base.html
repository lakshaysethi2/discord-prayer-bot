<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prayer Bot{% endblock %}</title>
  <script>
    // Prevent flash: apply dark mode before page renders
    (function() {
      var theme = localStorage.getItem('theme');
      if (theme === 'dark') {
        document.documentElement.className = 'dark';
      } else {
        document.documentElement.className = 'light';
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type="range"] { accent-color: #6366f1; }
    select { background-image: none; }

    /* ── Light mode (default) overrides ── */
    html.light body {
      background-color: #f8fafc !important; color: #1e293b !important;
    }
    /* backgrounds */
    html.light .bg-slate-950 { background-color: #f8fafc !important; }
    html.light .bg-slate-900 { background-color: #ffffff !important; }
    html.light .bg-slate-900\/60 { background-color: rgba(255,255,255,0.9) !important; }
    html.light .bg-slate-800 { background-color: #f1f5f9 !important; }
    html.light .bg-slate-800\/50 { background-color: rgba(241,245,249,0.7) !important; }
    html.light .bg-emerald-900\/40 { background-color: #d1fae5 !important; }
    html.light .bg-red-900\/50 { background-color: #fee2e2 !important; }
    html.light .bg-indigo-800\/60 { background-color: #e0e7ff !important; }
    html.light .from-indigo-900\/60 { --tw-gradient-from: #e0e7ff !important; }
    html.light .to-purple-900\/60 { --tw-gradient-to: #ede9fe !important; }
    /* text */
    html.light .text-slate-100 { color: #1e293b !important; }
    html.light .text-slate-300 { color: #475569 !important; }
    html.light .text-slate-400 { color: #64748b !important; }
    html.light .text-slate-500 { color: #94a3b8 !important; }
    html.light .text-slate-600 { color: #94a3b8 !important; }
    html.light .text-emerald-200 { color: #047857 !important; }
    html.light .text-emerald-400 { color: #059669 !important; }
    html.light .text-indigo-200 { color: #3730a3 !important; }
    html.light .text-indigo-300 { color: #4338ca !important; }
    html.light .text-red-300 { color: #dc2626 !important; }
    /* borders */
    html.light .border-slate-800 { border-color: #e2e8f0 !important; }
    html.light .border-slate-800\/50 { border-color: rgba(226,232,240,0.7) !important; }
    html.light .border-slate-700 { border-color: #cbd5e1 !important; }
    html.light .border-slate-600 { border-color: #cbd5e1 !important; }
    html.light .border-emerald-700 { border-color: #6ee7b7 !important; }
    html.light .border-red-800\/50 { border-color: #fecaca !important; }
    html.light .border-indigo-700\/50 { border-color: #c7d2fe !important; }
    /* hover */
    html.light .hover\:bg-slate-700:hover { background-color: #e2e8f0 !important; }
    html.light .hover\:bg-red-800\/50:hover { background-color: #fecaca !important; }
    html.light .hover\:text-white:hover { color: #0f172a !important; }
    html.light .hover\:text-slate-300:hover { color: #334155 !important; }
    html.light .hover\:text-emerald-400:hover { color: #047857 !important; }
    html.light .hover\:text-indigo-300:hover { color: #3730a3 !important; }
    html.light .hover\:border-slate-700:hover { border-color: #cbd5e1 !important; }
    /* header specific */
    html.light header { border-color: #e2e8f0 !important; }
    /* form inputs */
    html.light select.bg-slate-800 { background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #1e293b !important; }
    html.light input.bg-slate-800 { background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #1e293b !important; }
    html.light input[type="time"].bg-slate-800 { background-color: #f1f5f9 !important; border-color: #cbd5e1 !important; color: #1e293b !important; }
    html.light input[type="checkbox"].bg-slate-800 { accent-color: #6366f1; }
    /* badge */
    html.light .inline-block.rounded-full.bg-slate-800 { background-color: #e2e8f0 !important; color: #475569 !important; }

    /* ── Theme toggle button ── */
    #theme-toggle {
      cursor: pointer; background: none; border: 1px solid;
      border-radius: 9999px; padding: 4px 10px; font-size: 14px;
      transition: background 0.2s, color 0.2s;
    }
    html.light #theme-toggle {
      color: #475569; border-color: #cbd5e1;
    }
    html.light #theme-toggle:hover { background: #f1f5f9; }
    html.dark #theme-toggle {
      color: #94a3b8; border-color: #475569;
    }
    html.dark #theme-toggle:hover { background: #1e293b; }

    /* smooth transition on body */
    body { transition: background-color 0.2s, color 0.2s; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">
  <header class="border-b border-slate-800 bg-slate-900/60">
    <nav class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-4 text-sm">
      <a href="/" class="font-semibold text-slate-100 hover:text-white">🕌 Prayer Bot</a>
      <a href="/servers" class="text-slate-300 hover:text-white">Servers</a>
      <div class="grow"></div>
      <button id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">☀️</button>
      {% if request.cookies.get('prayer_session') %}
        <a href="/servers" class="text-slate-300 hover:text-white">Dashboard</a>
      {% else %}
        <a href="/login" class="text-slate-300 hover:text-white">Login</a>
      {% endif %}
    </nav>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <script>
    function updateToggleIcon() {
      var btn = document.getElementById('theme-toggle');
      btn.textContent = document.documentElement.className === 'dark' ? '\u{1F311}' : '\u2600\uFE0F';
    }
    function toggleTheme() {
      var html = document.documentElement;
      if (html.className === 'dark') {
        html.className = 'light';
        localStorage.setItem('theme', 'light');
      } else {
        html.className = 'dark';
        localStorage.setItem('theme', 'dark');
      }
      updateToggleIcon();
    }
    updateToggleIcon();
  </script>
</body>
</html>
